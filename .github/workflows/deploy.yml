name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync images (JP filename → EN filename)
        run: npm run sync-images

      - name: Build
        run: npm run build

      - name: Verify .nojekyll exists in output
        run: |
          if [ ! -f out/.nojekyll ]; then
            echo "ERROR: out/.nojekyll が見つかりません。Jekyll が _next/ を無視する可能性があります。"
            exit 1
          fi
          echo "OK: out/.nojekyll を確認しました"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
